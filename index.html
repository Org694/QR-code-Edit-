<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCode | QR & Barcode Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1e293b; }
        
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; margin-bottom: 1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }

        .output-container { margin: 20px 0; padding: 20px; border: 1px dashed #cbd5e1; border-radius: 12px; background: #fff; }
        
        canvas, img { max-width: 100%; height: auto; margin-bottom: 10px; }
        #barcode { width: 100%; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        
        .btn-generate { background: var(--primary); color: white; grid-column: span 2; font-size: 1.1rem; }
        .btn-generate:hover { background: #4f46e5; }
        
        .btn-share { background: #22c55e; color: white; }
        .btn-download { background: #64748b; color: white; }
        button:active { transform: scale(0.98); }

        .label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <h1>QuickCode Generator</h1>
    
    <input type="text" id="userInput" placeholder="Enter text, name, or URL..." value="https://google.com">
    
    <button class="btn-generate" onclick="generateAll()">Generate Now</button>

    <div class="output-container">
        <div class="label">QR Code</div>
        <div id="qrcode"></div>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <div class="label">Barcode</div>
        <svg id="barcode"></svg>
    </div>

    <div class="btn-group">
        <button class="btn-share" onclick="shareContent()">Share Link</button>
        <button class="btn-download" onclick="downloadQR()">Save QR</button>
    </div>
</div>

<script>
    const qrDiv = document.getElementById("qrcode");
    let qr = new QRCode(qrDiv, { width: 200, height: 200 });

    function generateAll() {
        const val = document.getElementById("userInput").value;
        if(!val) return alert("Please enter some text!");

        // 1. Update QR Code
        qr.clear();
        qr.makeCode(val);

        // 2. Update Barcode
        JsBarcode("#barcode", val, {
            format: "CODE128",
            lineColor: "#000",
            width: 2,
            height: 80,
            displayValue: true
        });
    }

    // Share Functionality
    async function shareContent() {
        const val = document.getElementById("userInput").value;
        if (!navigator.share) {
            alert("Sharing not supported on this browser. Copy the text instead!");
            return;
        }

        try {
            await navigator.share({
                title: 'Shared from QuickCode',
                text: 'Check out this generated code for: ' + val,
                url: val.startsWith('http') ? val : ''
            });
        } catch (err) {
            console.log("Error sharing:", err);
        }
    }

    // Download QR Function
    function downloadQR() {
        const img = qrDiv.querySelector("img");
        if (img) {
            const link = document.createElement("a");
            link.href = img.src;
            link.download = "QR_Code.png";
            link.click();
        }
    }

    // Run once on load
    window.onload = generateAll;
</script>

</body>
</html>
