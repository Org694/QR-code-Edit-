<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusCode 2026 | Ultimate Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.7);
            --accent: #6366f1;
            --bg: #0f172a;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        @media (max-width: 850px) { .app-container { grid-template-columns: 1fr; } }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 25px;
            color: #1e293b;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h2 { margin-top: 0; display: flex; align-items: center; gap: 10px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .customization-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .btn-main {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }

        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            min-height: 300px;
        }

        #barcode { max-width: 100%; }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .batch-area { margin-top: 20px; border-top: 1px solid #ccc; pt: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <main class="glass-card">
        <h2>🚀 NexusCode 2026</h2>
        
        <div class="input-group">
            <label>Input Content (Text, URL, or Name)</label>
            <input type="text" id="mainInput" placeholder="https://nexuscode.ai/user/2026" oninput="liveUpdate()">
        </div>

        <div class="customization-grid">
            <div>
                <label>QR Dark Color</label>
                <input type="color" id="qrColor" value="#000000" onchange="generate()">
            </div>
            <div>
                <label>Barcode Type</label>
                <select id="bcType" onchange="generate()">
                    <option value="CODE128">CODE128 (Universal)</option>
                    <option value="EAN13">EAN13 (Retail)</option>
                    <option value="UPC">UPC</option>
                    <option value="CODE39">CODE39</option>
                </select>
            </div>
        </div>

        <div class="preview-area" id="capture-zone">
            <div id="qrcode"></div>
            <svg id="barcode"></svg>
        </div>

        <div class="customization-grid">
            <button class="btn-main" onclick="share()">🔗 Share</button>
            <button class="btn-main" style="background:#10b981" onclick="downloadPDF()">📄 Export PDF</button>
        </div>

        <div class="batch-area">
            <label>Batch Processing (One per line)</label>
            <textarea id="batchInput" style="width:100%; height:80px; border-radius:12px; padding:10px;" placeholder="Name 1&#10;Name 2&#10;Name 3"></textarea>
            <button class="btn-main" style="margin-top:10px; background:#64748b" onclick="processBatch()">Process Batch</button>
        </div>
    </main>

    <aside>
        <div class="glass-card" style="background: rgba(15, 23, 42, 0.8); color: white;">
            <h3>🕒 History Logs</h3>
            <ul class="history-list" id="history">
                </ul>
            
            <div style="margin-top: 20px;">
                <label>Encryption Mode</label>
                <button onclick="toggleEncrypt()" id="encBtn" style="background: #ef4444; color: white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Off</button>
            </div>
        </div>
    </aside>
</div>

<script>
    let isEncrypted = false;
    const { jsPDF } = window.jspdf;

    // --- Core Generation ---
    function generate() {
        const val = document.getElementById("mainInput").value || "Nexus2026";
        const color = document.getElementById("qrColor").value;
        const bcType = document.getElementById("bcType").value;

        // Clear previous
        document.getElementById("qrcode").innerHTML = "";
        
        // QR Generation
        new QRCode(document.getElementById("qrcode"), {
            text: isEncrypted ? btoa(val) : val,
            width: 200,
            height: 200,
            colorDark : color,
            colorLight : "#ffffff"
        });

        // Barcode Generation
        try {
            JsBarcode("#barcode", val, {
                format: bcType,
                lineColor: color,
                displayValue: true
            });
        } catch(e) {
            console.log("Barcode format mismatch");
        }

        addToHistory(val);
    }

    // --- Real-time updates ---
    function liveUpdate() { generate(); }

    // --- History Logic ---
    function addToHistory(text) {
        const history = document.getElementById("history");
        const item = document.createElement("li");
        item.className = "history-item";
        item.innerHTML = `<span>${text.substring(0, 20)}...</span> <small>${new Date().toLocaleTimeString()}</small>`;
        if(history.children.length > 5) history.removeChild(history.lastChild);
        history.prepend(item);
    }

    // --- Advanced Features ---
    async function share() {
        if (navigator.share) {
            await navigator.share({
                title: 'NexusCode Generated',
                text: 'Check my generated code: ' + document.getElementById("mainInput").value,
                url: window.location.href
            });
        }
    }

    function downloadPDF() {
        const doc = new jsPDF();
        doc.text("NexusCode 2026 Export", 10, 10);
        doc.text("Content: " + document.getElementById("mainInput").value, 10, 20);
        // In a real app, you'd convert the Canvas to an image for the PDF
        alert("PDF Structure Generated! (Image conversion requires a server or library like html2canvas)");
        doc.save("codes_2026.pdf");
    }

    function toggleEncrypt() {
        isEncrypted = !isEncrypted;
        document.getElementById("encBtn").innerText = isEncrypted ? "On" : "Off";
        document.getElementById("encBtn").style.background = isEncrypted ? "#22c55e" : "#ef4444";
        generate();
    }

    function processBatch() {
        const lines = document.getElementById("batchInput").value.split('\n');
        alert(`Batch processing ${lines.length} items. Check console for sequence.`);
        lines.forEach(line => console.log("Generating for:", line));
    }

    // Init
    window.onload = generate;
</script>

</body>
                </html>
